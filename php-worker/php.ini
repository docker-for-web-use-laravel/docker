; PHP Worker 自訂設定檔（針對背景任務優化）

; 設定 PHP 記憶體使用上限（Worker 任務可能需要較多記憶體）
memory_limit = 512M

; 設定單一腳本最大執行時間（Worker 任務通常執行時間較長）
max_execution_time = 0

; 設定時區為亞洲/台北
date.timezone = Asia/Taipei

; 關閉錯誤顯示（改用日誌記錄）
display_errors = Off

; 啟用錯誤日誌記錄
log_errors = On

; 設定 OPcache 啟用
opcache.enable = 1

; 設定 OPcache CLI 模式啟用（Worker 使用 CLI 運行）
opcache.enable_cli = 1

; 設定 OPcache 可快取的腳本數量上限
opcache.max_accelerated_files = 10000

; 設定 OPcache 記憶體大小（MB）
opcache.memory_consumption = 128

; 設定 OPcache 字串緩衝區大小（MB）
opcache.interned_strings_buffer = 16
