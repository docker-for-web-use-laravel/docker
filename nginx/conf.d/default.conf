# 站台伺服器設定區塊
server {
    # 監聽 HTTP 埠號 80
    listen 80;

    # 設定伺服器名稱（本地開發可用 localhost，正式環境請改為實際網域）
    server_name localhost;

    # 設定網站根目錄（需與 php-fpm 容器掛載路徑一致）
    root /var/www/html/public;

    # 設定預設首頁檔案（依序尋找）
    index index.php index.html;

    # 設定存取日誌路徑
    access_log /var/log/nginx/access.log main;

    # 設定錯誤日誌路徑
    error_log /var/log/nginx/error.log warn;

    # 設定字元編碼為 UTF-8
    charset utf-8;

    # 停用 favicon.ico 的存取日誌（避免產生大量無意義紀錄）
    location = /favicon.ico {
        # 靜默忽略找不到檔案的錯誤
        log_not_found off;
        # 不記錄此路徑的存取日誌
        access_log off;
    }

    # 停用 robots.txt 的存取日誌
    location = /robots.txt {
        # 靜默忽略找不到檔案的錯誤
        log_not_found off;
        # 不記錄此路徑的存取日誌
        access_log off;
    }

    # Laravel 主要路由設定（所有請求轉發至 index.php）
    location / {
        # 嘗試直接提供靜態檔案，找不到時才轉發給 PHP 處理
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 請求處理設定（將 .php 請求轉發至 php-fpm 容器）
    location ~ \.php$ {
        # 防止執行上傳目錄中的 PHP 檔案（安全防護）
        try_files $uri =404;

        # 分離 PHP 腳本路徑與路徑資訊
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # 設定 FastCGI 連線目標（php-fpm 服務名稱與埠號）
        fastcgi_pass php-fpm:9000;

        # 設定 FastCGI 預設首頁
        fastcgi_index index.php;

        # 載入標準 FastCGI 參數設定檔
        include fastcgi_params;

        # 設定 PHP 腳本路徑（告訴 php-fpm 執行哪個檔案）
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        # 設定文件根目錄參數
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # 設定 FastCGI 讀取逾時時間（需大於 PHP max_execution_time）
        fastcgi_read_timeout 300;

        # 設定 FastCGI 連線逾時時間
        fastcgi_connect_timeout 60;

        # 設定 FastCGI 傳送逾時時間
        fastcgi_send_timeout 300;

        # 設定 FastCGI 緩衝區數量與大小
        fastcgi_buffer_size 128k;

        # 設定 FastCGI 緩衝區
        fastcgi_buffers 4 256k;

        # 設定 FastCGI 繁忙緩衝區大小
        fastcgi_busy_buffers_size 256k;
    }

    # 靜態資源快取設定（圖片、字型、CSS、JS 等）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
        # 設定靜態資源快取有效期為 30 天
        expires 30d;
        # 新增快取控制標頭（允許公開快取）
        add_header Cache-Control "public, no-transform";
        # 靜默忽略找不到靜態資源的錯誤
        log_not_found off;
    }

    # 禁止存取隱藏檔案（如 .env、.git 等）
    location ~ /\. {
        # 拒絕所有存取隱藏檔案的請求
        deny all;
        # 靜默忽略錯誤
        log_not_found off;
        # 不記錄存取日誌
        access_log off;
    }
}
