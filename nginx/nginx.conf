# 設定 Nginx Worker 程序執行使用者（與容器預設一致）
user nginx;

# 設定 Worker 程序數量（auto 表示自動偵測 CPU 核心數）
worker_processes auto;

# 設定錯誤日誌路徑與等級
error_log /var/log/nginx/error.log warn;

# 設定 PID 檔案路徑
pid /var/run/nginx.pid;

# 事件模組設定
events {
    # 設定每個 Worker 程序最大同時連線數
    worker_connections 1024;
}

# HTTP 模組設定
http {
    # 引入 MIME 類型定義檔（讓 Nginx 正確識別各種檔案格式）
    include /etc/nginx/mime.types;

    # 設定預設 MIME 類型（未知格式一律以二進位串流傳輸）
    default_type application/octet-stream;

    # 設定存取日誌格式（main 為內建標準格式）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 設定存取日誌路徑（使用 main 格式）
    access_log /var/log/nginx/access.log main;

    # 啟用 sendfile 加速靜態檔案傳輸
    sendfile on;

    # 啟用 TCP 推送優化（減少封包數量、提升傳輸效率）
    tcp_nopush on;

    # 啟用 TCP 即時傳送（減少延遲）
    tcp_nodelay on;

    # 設定 Keep-Alive 連線逾時時間（秒）
    keepalive_timeout 65;

    # 設定請求標頭緩衝區大小
    client_header_buffer_size 1k;

    # 設定請求本體大小上限（需與 PHP 上傳限制一致）
    client_max_body_size 64M;

    # 啟用 Gzip 壓縮以縮減傳輸資料量
    gzip on;

    # 設定 Gzip 壓縮等級（1-9，數字越大壓縮率越高但 CPU 消耗越多）
    gzip_comp_level 5;

    # 設定最小啟用 Gzip 壓縮的回應大小（小於此值不壓縮）
    gzip_min_length 256;

    # 設定支援 Gzip 壓縮的 MIME 類型
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 載入 conf.d 目錄下所有站台設定檔
    include /etc/nginx/conf.d/*.conf;
}
