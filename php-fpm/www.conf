; PHP-FPM 進程池設定檔（www pool）

[www]
; 設定 FPM 執行使用者
user = www
; 設定 FPM 執行群組
group = www

; 設定監聽位址（TCP socket，供 Nginx 等 Web Server 連線）
listen = 0.0.0.0:9000

; 設定進程管理模式為動態（依流量自動調整 Worker 數量）
pm = dynamic

; 設定最大子程序數量
pm.max_children = 50

; 設定啟動時的子程序數量
pm.start_servers = 5

; 設定最少閒置子程序數量
pm.min_spare_servers = 5

; 設定最多閒置子程序數量
pm.max_spare_servers = 35

; 設定每個子程序處理請求上限後自動重啟（防止記憶體洩漏）
pm.max_requests = 500

; 啟用 FPM 狀態頁面（供監控工具查詢）
pm.status_path = /status

; 設定慢請求日誌門檻（超過 10 秒記錄）
request_slowlog_timeout = 10s

; 設定慢請求日誌路徑
slowlog = /var/log/php-fpm/slow.log
