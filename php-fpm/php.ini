; PHP 自訂設定檔（覆蓋預設值）

; 設定 PHP 上傳檔案大小上限為 64MB
upload_max_filesize = 64M

; 設定 POST 請求資料大小上限為 64MB
post_max_size = 64M

; 設定單一腳本最大執行時間（秒）
max_execution_time = 300

; 設定 PHP 記憶體使用上限為 256MB
memory_limit = 256M

; 設定時區為亞洲/台北
date.timezone = Asia/Taipei

; 關閉錯誤顯示（生產環境建議關閉，改用日誌記錄）
display_errors = Off

; 啟用錯誤日誌記錄
log_errors = On

; 設定 OPcache 啟用
opcache.enable = 1

; 設定 OPcache 可快取的腳本數量上限
opcache.max_accelerated_files = 10000

; 設定 OPcache 記憶體大小（MB）
opcache.memory_consumption = 128

; 設定 OPcache 字串緩衝區大小（MB）
opcache.interned_strings_buffer = 16

; 設定 OPcache 重新驗證頻率（秒，0 表示每次請求都驗證）
opcache.revalidate_freq = 60
